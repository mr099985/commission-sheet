<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>委託資料製作工具</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--accent:#C084B0;--accent2:#8B5CF6;--bg:#1a1a2e;--sidebar-bg:#16213e;--text:#e8e8f0;--muted:#8888aa;--border:rgba(192,132,176,0.25);--input-bg:rgba(255,255,255,0.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}
#sidebar{width:310px;min-width:310px;background:var(--sidebar-bg);display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden}
#st{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
#st-text h1{font-size:13px;font-weight:500;color:var(--accent);letter-spacing:.05em}
#st-text p{font-size:10px;color:var(--muted);margin-top:2px}
#lang-sw{display:flex;gap:3px;flex-shrink:0;margin-top:1px}
.lbtn{padding:2px 6px;font-size:10px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .15s}
.lbtn:hover{color:var(--text);border-color:var(--accent)}
.lbtn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.tabs{display:flex;border-bottom:1px solid var(--border)}
.tab{flex:1;padding:7px 2px;font-size:11px;text-align:center;cursor:pointer;color:var(--muted);border:none;background:transparent;transition:all .15s;font-family:inherit}
.tab:hover{color:var(--text)}.tab.active{color:var(--accent);border-bottom:2px solid var(--accent)}
#panels{flex:1;overflow-y:auto;padding:12px}
#panels::-webkit-scrollbar{width:3px}
#panels::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.panel{display:none}.panel.active{display:block}
.sec{margin-bottom:12px}
.sl{font-size:10px;font-weight:500;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;padding-bottom:5px;border-bottom:1px solid var(--border);margin-bottom:8px}
.field{margin-bottom:8px}
.field label{font-size:11px;color:var(--muted);display:block;margin-bottom:3px}
.field input,.field textarea,.field select{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:12px;padding:5px 8px;outline:none;transition:border-color .15s;resize:vertical}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}
.field textarea{min-height:60px}.field select option{background:#1a1a2e}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.radio-row{display:flex;gap:8px;align-items:center;padding:5px 0}
.radio-opt{display:flex;align-items:center;gap:5px;cursor:pointer;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--input-bg);transition:all .15s;font-size:12px;color:var(--muted)}
.radio-opt:hover{border-color:var(--accent);color:var(--text)}
.radio-opt input[type=radio]{display:none}
.radio-opt.selected{background:rgba(192,132,176,.15);border-color:var(--accent);color:var(--accent)}
.radio-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid currentColor;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.radio-opt.selected .radio-dot::after{content:'';width:4px;height:4px;border-radius:50%;background:var(--accent);display:block}
.tw{display:flex;flex-wrap:wrap;gap:4px;background:var(--input-bg);border:1px solid var(--border);border-radius:5px;padding:5px 7px;min-height:34px;cursor:text}
.tw:focus-within{border-color:var(--accent)}
.tg{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:11px}
.tg.c{background:rgba(192,132,176,.2);color:var(--accent)}
.tg.ok{background:rgba(52,211,153,.15);color:#6ee7b7}
.tg.ng{background:rgba(239,68,68,.15);color:#f87171}
.tg .x{cursor:pointer;opacity:.5;font-size:10px;margin-left:1px}.tg .x:hover{opacity:1}
.ti{border:none;background:transparent;color:var(--text);font-size:12px;outline:none;flex:1;min-width:70px}
.iu{background:var(--input-bg);border:1px dashed var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:border-color .15s}
.iu:hover{border-color:var(--accent)}
.iu.main-slot{height:110px;width:100%}
.iu.sq{aspect-ratio:1}
.iu img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.iu .ph{display:flex;flex-direction:column;align-items:center;gap:3px;pointer-events:none}
.iu .ph span{font-size:10px;color:var(--muted)}
.ref-slot-wrap{display:flex;flex-direction:column;gap:4px}
.ref-caption{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:11px;padding:4px 7px;outline:none;resize:none;height:38px;transition:border-color .15s}
.ref-caption:focus{border-color:var(--accent)}
.ig2{display:grid;grid-template-columns:repeat(2,1fr);gap:5px}
#actions{padding:10px 12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.btn{width:100%;padding:7px 10px;border-radius:6px;font-size:12px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;border:1px solid var(--border);background:var(--input-bg);color:var(--text);transition:all .15s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.p{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-weight:500}
.btn.p:hover{opacity:.9}
.b2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
#smsg{font-size:11px;color:var(--accent);text-align:center;min-height:16px}
#right{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#111122}
.zb{display:flex;align-items:center;gap:8px;padding:7px 14px;border-bottom:1px solid rgba(192,132,176,.15);font-size:11px;color:var(--muted);flex-shrink:0}
.zb input[type=range]{width:90px;accent-color:var(--accent)}
#pw{flex:1;overflow:auto;display:flex;justify-content:center;align-items:flex-start;padding:20px}
#pw::-webkit-scrollbar{width:5px}
#pw::-webkit-scrollbar-thumb{background:rgba(192,132,176,.2);border-radius:3px}
#tw2{transform-origin:top center;transition:transform .2s}
canvas#cv{display:block;border-radius:4px;box-shadow:0 4px 32px rgba(0,0,0,.5)}
</style>
</head>
<body>
<div id="sidebar">
  <div id="st">
    <div id="st-text">
      <h1 id="ui-title">委託資料製作工具</h1>
      <p id="ui-subtitle">填寫 → 即時預覽 → 輸出 PNG</p>
    </div>
    <div id="lang-sw">
      <button class="lbtn active" onclick="setLang('zh')">繁中</button>
      <button class="lbtn" onclick="setLang('ja')">日本語</button>
      <button class="lbtn" onclick="setLang('en')">EN</button>
      <button class="lbtn" onclick="setLang('ko')">한국어</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-chara" onclick="sw('chara')"></button>
    <button class="tab" id="tab-comm" onclick="sw('comm')"></button>
    <button class="tab" id="tab-imgs" onclick="sw('imgs')"></button>
    <button class="tab" id="tab-style" onclick="sw('style')"></button>
  </div>
  <div id="panels">
    <div class="panel active" id="panel-chara">
      <div class="sec"><div class="sl" id="sl-basic"></div>
        <div class="field"><label id="lbl-cname"></label><input id="c-name" oninput="draw()"></div>
        <div class="field r3">
          <div><label id="lbl-gender"></label><input id="c-gender" oninput="draw()"></div>
          <div><label id="lbl-bday"></label><input id="c-bday" oninput="draw()"></div>
          <div><label id="lbl-age"></label><input id="c-age" oninput="draw()"></div>
        </div>
        <div class="field r3">
          <div><label id="lbl-height"></label><input id="c-h" oninput="draw()"></div>
          <div><label id="lbl-weight"></label><input id="c-w" oninput="draw()"></div>
          <div><label id="lbl-body"></label><input id="c-body" oninput="draw()"></div>
        </div>
        <div class="field r3">
          <div><label id="lbl-hair"></label><input id="c-hair" oninput="draw()"></div>
          <div><label id="lbl-eye"></label><input id="c-eye" oninput="draw()"></div>
          <div><label id="lbl-skin"></label><input id="c-skin" oninput="draw()"></div>
        </div>
      </div>
      <div class="sec"><div class="sl" id="sl-persona"></div>
        <div class="field"><label id="lbl-pers"></label><textarea id="c-pers" oninput="draw()"></textarea></div>
        <div class="field"><label id="lbl-bg"></label><textarea id="c-bg" oninput="draw()"></textarea></div>
      </div>
      <div class="sec"><div class="sl" id="sl-chartags"></div>
        <div class="tw" onclick="this.querySelector('input').focus()"><span id="tags-chara"></span><input class="ti" id="ti-chara" onkeydown="addTag('chara',event)"></div>
      </div>
    </div>
    <div class="panel" id="panel-comm">
      <div class="sec"><div class="sl" id="sl-commreq"></div>
        <div class="field"><label id="lbl-cmtype"></label><input id="cm-type" oninput="draw()"></div>
        <div class="field"><label id="lbl-cmnote"></label><textarea id="cm-note" oninput="draw()"></textarea></div>
      </div>
      <div class="sec">
        <div class="field">
          <label id="lbl-cmcom"></label>
          <div class="radio-row">
            <label class="radio-opt selected" id="radio-noncom" onclick="setLicense('noncom')">
              <input type="radio" name="cm-com" value="noncom" checked>
              <span class="radio-dot"></span>
              <span id="opt-noncom"></span>
            </label>
            <label class="radio-opt" id="radio-com" onclick="setLicense('com')">
              <input type="radio" name="cm-com" value="com">
              <span class="radio-dot"></span>
              <span id="opt-com"></span>
            </label>
          </div>
        </div>
        <div class="field"><label id="lbl-cmplat"></label><input id="cm-plat" oninput="draw()"></div>
      </div>
      <div class="sec"><div class="sl" id="sl-ok"></div>
        <div class="tw" onclick="this.querySelector('input').focus()"><span id="tags-ok"></span><input class="ti" id="ti-ok" onkeydown="addTag('ok',event)"></div>
      </div>
      <div class="sec"><div class="sl" id="sl-ng"></div>
        <div class="tw" onclick="this.querySelector('input').focus()"><span id="tags-ng"></span><input class="ti" id="ti-ng" onkeydown="addTag('ng',event)"></div>
      </div>
      <div class="sec"><div class="sl" id="sl-contact"></div>
        <div class="field r2">
          <div><label id="lbl-ctname"></label><input id="ct-name" oninput="draw()"></div>
          <div><label>Twitter</label><input id="ct-tw" oninput="draw()" placeholder="@handle"></div>
        </div>
      </div>
    </div>
    <div class="panel" id="panel-imgs">
      <div class="sec"><div class="sl" id="sl-mainimg"></div>
        <div class="field">
          <label id="lbl-main1" style="margin-bottom:5px;display:block"></label>
          <div style="font-size:10px;color:var(--muted);margin-bottom:4px" id="hint-main1"></div>
          <div class="iu main-slot" id="main-up" onclick="pickImg('main')">
            <div class="ph"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span id="hint-upload"></span></div>
          </div>
          <textarea class="ref-caption" id="main-cap" placeholder="" style="display:none;margin-top:4px" maxlength="50" oninput="IMGS.mainCaption=this.value.slice(0,50);draw()"></textarea>
        </div>
        <div class="field">
          <label id="lbl-main2" style="margin-bottom:5px;display:block"></label>
          <div style="font-size:10px;color:var(--muted);margin-bottom:4px" id="hint-main2"></div>
          <div class="iu main-slot" id="main2-up" onclick="pickImg('main2')">
            <div class="ph"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span id="hint-upload2"></span></div>
          </div>
          <textarea class="ref-caption" id="main2-cap" placeholder="" style="display:none;margin-top:4px" maxlength="50" oninput="IMGS.main2Caption=this.value.slice(0,50);draw()"></textarea>
        </div>
        <input type="hidden" id="main-layout" value="stack">
      </div>
      <div class="sec"><div class="sl" id="sl-smallimg"></div>
        <div style="font-size:10px;color:var(--muted);margin-bottom:6px" id="hint-small"></div>
        <div class="field">
          <label id="lbl-smallpos"></label>
          <div class="radio-row">
            <label class="radio-opt selected" id="radio-small-main" onclick="setSmallPos('below-main')">
              <input type="radio" name="small-pos" value="below-main" checked>
              <span class="radio-dot"></span>
              <span id="opt-small-main"></span>
            </label>
            <label class="radio-opt" id="radio-small-tags" onclick="setSmallPos('below-tags')">
              <input type="radio" name="small-pos" value="below-tags">
              <span class="radio-dot"></span>
              <span id="opt-small-tags"></span>
            </label>
          </div>
        </div>
        <div class="ig3" id="sg"></div>
        <button class="btn" style="margin-top:7px;font-size:11px" id="add-s" onclick="addSlot('small')" id="btn-adds"></button>
      </div>
      <div class="sec"><div class="sl" id="sl-refimg"></div>
        <div style="font-size:10px;color:var(--muted);margin-bottom:6px" id="hint-ref"></div>
        <div class="field">
          <label id="lbl-reflayout"></label>
          <div class="radio-row">
            <label class="radio-opt selected" id="radio-ref-orig" onclick="setRefLayout('orig')">
              <input type="radio" name="ref-layout" value="orig" checked>
              <span class="radio-dot"></span>
              <span id="opt-ref-orig"></span>
            </label>
            <label class="radio-opt" id="radio-ref-grid" onclick="setRefLayout('grid')">
              <input type="radio" name="ref-layout" value="grid">
              <span class="radio-dot"></span>
              <span id="opt-ref-grid"></span>
            </label>
          </div>
        </div>
        <div class="ig2" id="rg"></div>
        <button class="btn" style="margin-top:7px;font-size:11px" id="add-r" onclick="addSlot('ref')" id="btn-addr"></button>
      </div>
    </div>
    <div class="panel" id="panel-style">
      <div class="sec"><div class="sl" id="sl-bodylayout"></div>
        <div class="field">
          <div class="radio-row">
            <label class="radio-opt selected" id="radio-layout-stack" onclick="setBodyLayout('stack')">
              <input type="radio" name="body-layout" value="stack" checked>
              <span class="radio-dot"></span>
              <span id="opt-layout-stack"></span>
            </label>
            <label class="radio-opt" id="radio-layout-side" onclick="setBodyLayout('side')">
              <input type="radio" name="body-layout" value="side">
              <span class="radio-dot"></span>
              <span id="opt-layout-side"></span>
            </label>
          </div>
        </div>
      </div>
      <div class="sec"><div class="sl" id="sl-theme"></div>
        <div class="field r2">
          <div><label id="lbl-cola"></label><input type="color" id="col-a" value="#C084B0" oninput="draw()"></div>
          <div><label id="lbl-colb"></label><input type="color" id="col-b" value="#8B5CF6" oninput="draw()"></div>
        </div>
      </div>
      <div class="sec"><div class="sl" id="sl-colors"></div>
        <div class="field r2">
          <div><label id="lbl-col-bg"></label><input type="color" id="col-bg" value="#f7f4f9" oninput="draw()"></div>
          <div><label id="lbl-col-text"></label><input type="color" id="col-text" value="#1a1a2e" oninput="draw()"></div>
        </div>
        <div class="field r2">
          <div><label id="lbl-col-label"></label><input type="color" id="col-label" value="#8888aa" oninput="draw()"></div>
          <div><label id="lbl-col-card"></label><input type="color" id="col-card" value="#ede5f4" oninput="draw()"></div>
        </div>
      </div>
      <div class="sec" id="sec-colwidth"><div class="sl" id="sl-colwidth"></div>
        <div class="field" style="display:flex;align-items:center;gap:8px">
          <input type="range" min="20" max="55" value="35" id="col-pct" oninput="draw();g('col-pct-lbl').textContent=this.value+'%'" style="flex:1;accent-color:var(--accent)">
          <span id="col-pct-lbl" style="font-size:11px;color:var(--muted);min-width:32px">35%</span>
        </div>
        <div style="font-size:10px;color:var(--muted);margin-top:-2px" id="hint-colwidth"></div>
      </div>
      <div class="sec"><div class="sl" id="sl-outsize"></div>
        <div class="field">
          <select id="sz" onchange="draw()">
            <option value="900" id="opt-sz900"></option>
            <option value="1200" id="opt-sz1200"></option>
            <option value="1080" id="opt-sz1080"></option>
          </select>
        </div>
      </div>
      <div class="sec"><div class="sl" id="sl-tpl"></div>
        <div class="field r2">
          <div><input id="tpl-n" id="input-tplname"></div>
          <div><button class="btn" id="btn-savetpl" onclick="saveTpl()"></button></div>
        </div>
        <div id="tpl-list" style="display:flex;flex-direction:column;gap:5px;margin-top:6px"></div>
      </div>
    </div>
  </div>
  <div id="actions">
    <div id="smsg"></div>
    <div class="b2">
      <button class="btn" id="btn-expjson" onclick="exportJSON()"></button>
      <button class="btn" id="btn-impjson" onclick="g('ji').click()"></button>
    </div>
    <button class="btn p" id="btn-exppng" onclick="exportPNG()"></button>
    <input type="file" id="ji" accept=".json" style="display:none" onchange="importJSON(this)">
    <input type="file" id="ii" accept="image/*" style="display:none" onchange="loadImgFile(this)">
  </div>
</div>
<div id="right">
  <div class="zb">
    <span id="lbl-zoom">縮放</span>
    <input type="range" min="25" max="100" value="65" oninput="setZoom(this.value)">
    <span id="zlbl">65%</span>
    <span style="flex:1"></span>
    <span style="font-size:10px;opacity:.35" id="lbl-hint-right">Canvas 繪製 · 本地圖片完整支援</span>
  </div>
  <div id="pw"><div id="tw2"><canvas id="cv"></canvas></div></div>
</div>

<script>
// ── Language Dictionaries ──────────────────────────────────────────────
var LANGS = {
  zh: {
    // UI chrome
    'ui-title':       '委託資料製作工具',
    'ui-subtitle':    '填寫 → 即時預覽 → 輸出 PNG',
    'lbl-zoom':       '縮放',
    'lbl-hint-right': 'Canvas 繪製 · 本地圖片完整支援',
    // Tabs
    'tab-chara': '角色', 'tab-comm': '委託', 'tab-imgs': '圖片', 'tab-style': '樣式',
    // Chara tab
    'sl-basic':    '基本資訊',
    'lbl-cname':   '角色名稱',   'ph-cname':   '角色名稱',
    'lbl-gender':  '性別',       'ph-gender':  '女',
    'lbl-bday':    '生日',       'ph-bday':    'MM/DD',
    'lbl-age':     '年齡',       'ph-age':     '19歲',
    'lbl-height':  '身高',       'ph-height':  '168cm',
    'lbl-weight':  '體重',       'ph-weight':  '54kg',
    'lbl-body':    '體型描述',   'ph-body':    '纖細',
    'lbl-hair':    '髮色',       'ph-hair':    '銀白',
    'lbl-eye':     '瞳色',       'ph-eye':     '紫',
    'lbl-skin':    '膚色',       'ph-skin':    '白皙',
    'sl-persona':  '性格與設定',
    'lbl-pers':    '個性（最多6行）',  'ph-pers':    '冷靜外表下藏著熱情...',
    'lbl-bg':      '背景設定（最多6行）','ph-bg':      '世界觀、故事背景...',
    'sl-chartags': '特徵標籤（Enter 新增）', 'ph-chartags': '例: 貓耳',
    // Comm tab
    'sl-commreq':  '委託需求',
    'lbl-cmtype':  '委託項目',   'ph-cmtype':  '半身彩圖 / 立繪 / 表情包',
    'lbl-cmcom':   '授權範圍',
    'opt-noncom':  '非商業',     'opt-com':    '商業使用',
    'lbl-cmplat':  '用途',       'ph-cmplat':  '個人使用 / 桌布 / 印製商品 / SNS',
    'lbl-cmnote':  '需求描述（最多12行）','ph-cmnote':  '情境、文字描述、tag\n例：戶外咖啡廳、白天、放鬆的表情、#casual #smile',
    'sl-ok':       'OK 事項（Enter 新增）', 'ph-ok': '例: 原創背景',
    'sl-ng':       'NG 事項（Enter 新增）', 'ph-ng': '例: 過激表現',
    'sl-contact':  '聯絡資訊',
    'lbl-ctname':  '名稱',       'ph-ctname':  '委託人名稱',

function loadImgFile(input){
  var f=input.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(e){
    var im=new Image();im.src=e.target.result;
    im.onload=function(){
      if(imgTarget==='main'||imgTarget==='main2'){
        IMGS[imgTarget]=im;
        var box=g(imgTarget==='main'?'main-up':'main2-up');
        var ex=box.querySelector('img');if(ex)ex.remove();
        var el=document.createElement('img');el.src=e.target.result;box.appendChild(el);
        box.querySelector('.ph').style.display='none';
        // show caption field
        var capEl=g(imgTarget==='main'?'main-cap':'main2-cap');
        if(capEl)capEl.style.display='block';
      } else {
        var tp=imgTarget.type,i=imgTarget.idx;
        IMGS[tp][i]=im;
        var slot=g(tp+'-'+i);
        var ex2=slot.querySelector('img');if(ex2)ex2.remove();
        var el2=document.createElement('img');el2.src=e.target.result;slot.appendChild(el2);
        slot.querySelector('.ph').style.display='none';
        // show caption field for small type
        if(tp==='small'){var scap=g('small-cap-'+i);if(scap)scap.style.display='block';}
      }
      input.value='';draw();
    };
  };
  r.readAsDataURL(f);
}

// canvas drawing helpers
function rr(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);
  c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);
  c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);
  c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y+h-r,r);
  c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);
  c.closePath();
}
function imgCover(c,im,x,y,w,h,radius){
  if(!im)return;
  var s=Math.max(w/im.width,h/im.height);
  var sw=im.width*s,sh=im.height*s;
  c.save();rr(c,x,y,w,h,radius||6);c.clip();
  c.drawImage(im,x+(w-sw)/2,y+(h-sh)/2,sw,sh);
  c.restore();
}
function hex2rgba(hex,a){
  var r=parseInt(hex.slice(1,3),16),g2=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g2+','+b+','+a+')';
}
function wrapT(c,text,x,y,maxW,lh,maxL){
  if(!text)return y;
  var chars=text.split(''),line='',drawn=0;
  for(var i=0;i<chars.length;i++){
    var ch=chars[i];
    if(ch==='\n'){
      if(maxL&&drawn>=maxL-1&&i<chars.length-1){c.fillText(line+'…',x,y);return y+lh}
      c.fillText(line,x,y);y+=lh;line='';drawn++;continue;
    }
    var test=line+ch;
    if(c.measureText(test).width>maxW&&line!==''){
      if(maxL&&drawn>=maxL-1&&i<chars.length-1){c.fillText(line+'…',x,y);return y+lh}
      c.fillText(line,x,y);y+=lh;line=ch;drawn++;
    } else line=test;
  }
  if(line){c.fillText(line,x,y);y+=lh}
  return y;
}
function tagRow(c,items,x,y,maxX,lh,fillColor,strokeColor,textColor){
  var cx=x;
  items.forEach(function(tag){
    c.font="400 11px 'Noto Sans TC',sans-serif";
    var tw=c.measureText(tag).width+16;
    if(cx+tw>maxX){cx=x;y+=lh}
    rr(c,cx,y-13,tw,19,10);
    c.fillStyle=fillColor;c.fill();
    c.strokeStyle=strokeColor;c.lineWidth=0.5;c.stroke();
    c.fillStyle=textColor;c.fillText(tag,cx+8,y);
    cx+=tw+5;
  });
  return y+lh;
}

function getStats(){
  var s=[];
  var pairs=[
    ['c-gender',t('cv-gender')],
    ['c-bday',  t('cv-birthday')],
    ['c-age',   t('cv-age')],
    ['c-h',     t('cv-height')],
    ['c-w',     t('cv-weight')],
    ['c-body',  t('cv-body')],
    ['c-hair',  t('cv-hair')],
    ['c-eye',   t('cv-eye')],
    ['c-skin',  t('cv-skin')]
  ];
  pairs.forEach(function(p){if(v(p[0]))s.push({k:p[1],v:v(p[0])})});
  return s;
}

function draw(){
  var W=parseInt(v('sz'))||900;
  var ac=v('col-a')||'#C084B0';
  var ac2=v('col-b')||'#8B5CF6';
  var cBg=v('col-bg')||'#f7f4f9';
  var cText=v('col-text')||'#1a1a2e';
  var cLabel=v('col-label')||'#8888aa';
  var cCard=v('col-card')||'#ede5f4';
  var PAD=32,HDRH=90;
  var colPct=(parseInt(v('col-pct'))||35)/100;
  var layout=v('main-layout')||'side';
  var hasMain2=!!IMGS.main2;

  var leftW, mainBlockH, RX, RW;
  var stats=getStats();
  var mainCapEst=(IMGS.main&&IMGS.mainCaption||IMGS.main2&&IMGS.main2Caption)?20:0;
  var smallCapEst2=smallN>0&&IMGS.smallCaptions.slice(0,smallN).some(function(c){return c&&c.trim()})?Math.ceil(smallN/3)*18:0;
  var bodyH;

  if(currentBodyLayout==='stack'){
    if(!hasMain2){
      leftW=Math.round((W-PAD*2)*colPct);
      if(IMGS.main){var sc=Math.min(leftW/IMGS.main.width,1);mainBlockH=Math.round(IMGS.main.height*sc);}
      else mainBlockH=Math.round(leftW*(4/3));
    } else if(layout==='side'){
      leftW=Math.round((W-PAD*2)*colPct);
      var halfW=Math.floor((leftW-6)/2);
      var h1=IMGS.main  ? Math.round(halfW/IMGS.main.width *IMGS.main.height ) : Math.round(halfW*1.3);
      var h2=IMGS.main2 ? Math.round(halfW/IMGS.main2.width*IMGS.main2.height) : Math.round(halfW*1.3);
      mainBlockH=Math.max(h1,h2);
    } else {
      leftW=Math.round((W-PAD*2)*colPct);
      var h1s=IMGS.main  ? Math.round(leftW/IMGS.main.width *IMGS.main.height ) : Math.round(leftW*1.3);
      var h2s=IMGS.main2 ? Math.round(leftW/IMGS.main2.width*IMGS.main2.height) : Math.round(leftW*1.3);
      var stackCap1=(IMGS.main&&IMGS.mainCaption)?20:0;
      mainBlockH=h1s+6+stackCap1+h2s;
    }
    RX=PAD+leftW+20; RW=W-RX-PAD;
    var ry=0;
    ry+=50;
    if(T.chara.length)ry+=36+Math.ceil(T.chara.length/4)*24+14;
    if(currentSmallPos==='below-tags'&&smallN>0){var sWt2=Math.floor((RW-2*5)/3);ry+=Math.ceil(smallN/3)*(sWt2+(smallCapEst2?18:0)+5)+10;}
    if(stats.length)ry+=Math.ceil(stats.length/3)*52+10;
    var pers=v('c-pers'),bg=v('c-bg');
    if(pers)ry+=36+Math.min(6,Math.ceil(pers.length/20)+1)*20+14;
    if(bg)ry+=36+Math.min(6,Math.ceil(bg.length/20)+1)*20+14;
    var leftH=mainBlockH+mainCapEst+(smallN>0&&currentSmallPos==='below-main'?8+Math.ceil(smallN/3)*(Math.round(leftW/3)+5)+smallCapEst2:0);
    bodyH=Math.max(leftH,ry)+20;
  } else {
    // side layout: full width images, text below
    leftW=W-PAD*2; mainBlockH=0; RX=PAD; RW=W-PAD*2;
    var halfFWe=Math.floor((W-PAD*2-10)/2);
    var h1se=IMGS.main  ? Math.round(halfFWe/IMGS.main.width *IMGS.main.height ) : Math.round(halfFWe*1.2);
    var h2se=IMGS.main2 ? Math.round(halfFWe/IMGS.main2.width*IMGS.main2.height) : Math.round(halfFWe*1.2);
    var sideImgHe=Math.max(h1se,h2se);
    var sideCapHe=mainCapEst;
    var sideSmallHe=0;
    if(smallN>0&&currentSmallPos==='below-main'){var sWside3=Math.floor((W-PAD*2-5*5)/6);sideSmallHe=Math.ceil(smallN/6)*(sWside3+(smallCapEst2?18:0)+5)+10;}
    var textEst=0;
    textEst+=50; // name
    if(T.chara.length)textEst+=36+Math.ceil(T.chara.length/4)*24+6;
    if(smallN>0&&currentSmallPos==='below-tags'){var sWside4=Math.floor((W-PAD*2-5*5)/6);textEst+=Math.ceil(smallN/6)*(sWside4+(smallCapEst2?18:0)+5)+10;}
    else if(T.chara.length)textEst+=8;
    if(stats.length)textEst+=Math.ceil(stats.length/3)*52+10;
    var persE=v('c-pers'),bgE=v('c-bg');
    var halfTWe=Math.floor((W-PAD*2-20)/2);
    var persH2=persE?36+Math.min(6,Math.ceil(persE.length/20)+1)*20+14:0;
    var bgH2=bgE?36+Math.min(6,Math.ceil(bgE.length/20)+1)*20+14:0;
    textEst+=Math.max(persH2,bgH2);
    bodyH=sideImgHe+sideCapHe+sideSmallHe+textEst+20;
  }

  var CH=30+30+32; // title + badge row + padding
  var leftCWe=Math.round((W-PAD*2-20)*0.4);
  var rightCWe=W-PAD*2-20-leftCWe;
  var lhe=0,rhe=0;
  if(v('cm-plat'))lhe+=17+Math.min(3,v('cm-plat').length/12+1)*17+10;
  if(T.ok.length)lhe+=17+Math.ceil(T.ok.length/3)*20+6;
  if(T.ng.length)lhe+=17+Math.ceil(T.ng.length/3)*20+6;
  var note=v('cm-note');
  if(note)rhe+=17+Math.min(12,note.split('\n').length+2)*17+6;
  CH+=Math.max(lhe,rhe);
  var refImgs=IMGS.ref.filter(Boolean);
  if(refImgs.length){
    var refCapH=IMGS.refCaptions.slice(0,refImgs.length).some(function(c){return c&&c.trim()})?20:0;
    if(currentRefLayout==='grid'){
      var gCellWe=Math.floor((W-PAD*2-10)/2);
      var grows2=Math.ceil(refImgs.length/2);
      var gridTotalH=0;
      for(var gr2=0;gr2<grows2;gr2++){
        var rowH2=0;
        for(var gc2=0;gc2<2;gc2++){
          var gi2=gr2*2+gc2;
          if(gi2<refImgs.length){
            var sc2=Math.min(gCellWe/refImgs[gi2].width,1);
            var dh2=Math.round(refImgs[gi2].height*sc2);
            if(dh2>rowH2)rowH2=dh2;
          }
        }
        // capH: check each cell in this row for caption
        var capH2=0;
        for(var gc2b=0;gc2b<2;gc2b++){
          var gi2b=gr2*2+gc2b;
          if(gi2b<refImgs.length&&IMGS.refCaptions[gi2b]&&IMGS.refCaptions[gi2b].trim())capH2=20;
        }
        gridTotalH+=rowH2+capH2+(gr2<grows2-1?16:0);
      }
      CH+=36+gridTotalH+16;  // +16 bottom buffer
    } else {
      // orig: each image at full natural size, stacked vertically
      var origTotalH=0;
      refImgs.forEach(function(im){
        var dh=im.height;
        if(im.width>W-PAD*2)dh=Math.round(im.height*(W-PAD*2)/im.width);
        var cap=IMGS.refCaptions[refImgs.indexOf(im)]||'';
        origTotalH+=dh+(cap?22:0)+10;
      });
      CH+=36+origTotalH+8;
    }
  }

  var FOOTER=48;
  var H=HDRH+20+bodyH+24+CH+FOOTER+16;

  canvas.width=W*2;canvas.height=H*2;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(2,0,0,2,0,0);

  // BG
  ctx.fillStyle=cBg;ctx.fillRect(0,0,W,H);
  var g1=ctx.createRadialGradient(W*.95,H*.05,0,W*.95,H*.05,W*.5);
  g1.addColorStop(0,hex2rgba(ac2,.07));g1.addColorStop(1,'transparent');
  ctx.fillStyle=g1;ctx.fillRect(0,0,W,H);

  // HEADER
  var hg=ctx.createLinearGradient(0,0,W,HDRH);
  hg.addColorStop(0,'#1a1a2e');hg.addColorStop(.5,'#16213e');hg.addColorStop(1,'#0f3460');
  ctx.fillStyle=hg;ctx.fillRect(0,0,W,HDRH);
  var lg=ctx.createLinearGradient(0,0,W,0);
  lg.addColorStop(0,ac);lg.addColorStop(.5,ac2);lg.addColorStop(1,ac);
  ctx.fillStyle=lg;ctx.fillRect(0,HDRH-3,W,3);

  var ctName=v('ct-name'),ctTw=v('ct-tw');
  ctx.fillStyle='rgba(255,255,255,.45)';

  ctx.fillText(t('cv-client'),PAD,HDRH/2-4);
  ctx.fillStyle='#fff';
  ctx.font="700 20px 'Noto Serif TC',serif";

  if(ctTw){
    ctx.fillStyle='rgba(255,255,255,.55)';

    ctx.fillText(ctTw,PAD,HDRH/2+28);
  }
  var cmTypeVal=v('cm-type');
  ctx.textAlign='right';
  if(cmTypeVal){
    ctx.fillStyle='rgba(255,255,255,.45)';

    ctx.fillText(t('cv-commtype'),W-PAD,HDRH/2-2);

    ctx.font="700 16px 'Noto Serif TC',serif";
    ctx.fillText(cmTypeVal,W-PAD,HDRH/2+16);
  } else {
    ctx.fillStyle='rgba(255,255,255,.25)';
    ctx.font="400 11px 'Noto Sans TC',sans-serif";
    ctx.fillText(t('cv-refsheet'),W-PAD,HDRH/2+8);
  }
  ctx.textAlign='left';

  // BODY
  var y0=HDRH+20;

  function drawContain(im,x,y,boxW,boxH,radius,placeholder){
    rr(ctx,x,y,boxW,boxH,radius);
    if(im){
      var sc3=Math.min(boxW/im.width,boxH/im.height);
      var dw=Math.round(im.width*sc3),dh=Math.round(im.height*sc3);
      var ox=x+Math.round((boxW-dw)/2),oy=y+Math.round((boxH-dh)/2);
      ctx.fillStyle=cCard;ctx.fill();
      ctx.strokeStyle=hex2rgba(ac,.3);ctx.lineWidth=1.2;ctx.stroke();
      ctx.save();rr(ctx,x,y,boxW,boxH,radius);ctx.clip();
      ctx.drawImage(im,ox,oy,dw,dh);
      ctx.restore();
      ctx.strokeStyle=hex2rgba(ac,.3);ctx.lineWidth=1.2;
      rr(ctx,x,y,boxW,boxH,radius);ctx.stroke();
    } else {
      ctx.fillStyle=cCard;ctx.fill();
      ctx.strokeStyle=hex2rgba(ac,.2);ctx.lineWidth=1;ctx.stroke();
      ctx.fillStyle=cLabel;ctx.font="400 11px 'Noto Sans TC',sans-serif";ctx.textAlign='center';
      ctx.fillText(placeholder||t('cv-chara-ph'),x+boxW/2,y+boxH/2+4);ctx.textAlign='left';
    }
  }

  function drawSmallImgs(startX,startY,cellW,cols){
    var sW=Math.floor((cellW-(cols-1)*5)/cols);
    var hasSmallCap=IMGS.smallCaptions.slice(0,smallN).some(function(c){return c&&c.trim()});
    var sRowH=sW+(hasSmallCap?18:0);
    for(var si2=0;si2<smallN;si2++){
      var scx=startX+(si2%cols)*(sW+5),scy=startY+Math.floor(si2/cols)*(sRowH+5);
      if(IMGS.small[si2]){
        imgCover(ctx,IMGS.small[si2],scx,scy,sW,sW,5);
        ctx.strokeStyle=hex2rgba(ac,.2);ctx.lineWidth=.8;
        rr(ctx,scx,scy,sW,sW,5);ctx.stroke();
      } else {
        rr(ctx,scx,scy,sW,sW,5);ctx.fillStyle=cCard;ctx.fill();
      }
      var scap2=IMGS.smallCaptions[si2]||'';
      if(scap2&&IMGS.small[si2]){
        ctx.fillStyle=cLabel;ctx.font="400 10px 'Noto Sans TC',sans-serif";
        ctx.fillText(scap2.slice(0,50),scx+2,scy+sW+12);
      }
    }
  }

  // ── STACK LAYOUT (上下排列) ──
  if(currentBodyLayout==='stack'){
    // draw main images in left column
    if(!hasMain2){
      drawContain(IMGS.main,PAD,y0,leftW,mainBlockH,7,t('cv-chara-ph'));
      if(IMGS.main&&IMGS.mainCaption){ctx.fillStyle=cLabel;ctx.font="400 11px 'Noto Sans TC',sans-serif";ctx.fillText(IMGS.mainCaption.slice(0,50),PAD+4,y0+mainBlockH+13);}
    } else if(layout==='side'){
      var hw=Math.floor((leftW-6)/2);
      var h1d=IMGS.main  ? Math.round(hw/IMGS.main.width *IMGS.main.height ) : Math.round(hw*1.3);
      var h2d=IMGS.main2 ? Math.round(hw/IMGS.main2.width*IMGS.main2.height) : Math.round(hw*1.3);
      var tallH=Math.max(h1d,h2d);
      drawContain(IMGS.main, PAD,      y0,hw,tallH,7,t('cv-front'));
      drawContain(IMGS.main2,PAD+hw+6, y0,hw,tallH,7,t('cv-back'));
      if(IMGS.main&&IMGS.mainCaption){ctx.fillStyle=cLabel;ctx.font="400 11px 'Noto Sans TC',sans-serif";ctx.fillText(IMGS.mainCaption.slice(0,50),PAD+4,y0+tallH+13);}
      if(IMGS.main2&&IMGS.main2Caption){ctx.fillStyle=cLabel;ctx.font="400 11px 'Noto Sans TC',sans-serif";ctx.fillText(IMGS.main2Caption.slice(0,50),PAD+hw+6+4,y0+tallH+13);}
    } else {
      var w1=leftW,h1st=IMGS.main  ? Math.round(w1/IMGS.main.width *IMGS.main.height ) : Math.round(w1*1.3);
      var w2=leftW,h2st=IMGS.main2 ? Math.round(w2/IMGS.main2.width*IMGS.main2.height) : Math.round(w2*1.3);
      var cap1gap=(IMGS.main&&IMGS.mainCaption)?20:0;
      drawContain(IMGS.main, PAD,y0,w1,h1st,7,t('cv-front'));
      if(IMGS.main&&IMGS.mainCaption){ctx.fillStyle=cLabel;ctx.font="400 11px 'Noto Sans TC',sans-serif";ctx.fillText(IMGS.mainCaption.slice(0,50),PAD+4,y0+h1st+13);}
      drawContain(IMGS.main2,PAD,y0+h1st+6+cap1gap,w2,h2st,7,t('cv-back'));
      if(IMGS.main2&&IMGS.main2Caption){ctx.fillStyle=cLabel;ctx.font="400 11px 'Noto Sans TC',sans-serif";ctx.fillText(IMGS.main2Caption.slice(0,50),PAD+4,y0+h1st+6+cap1gap+h2st+13);}
    }
    // small images below main (if below-main)
    var mainCapOff=0;
    if(!hasMain2&&IMGS.main&&IMGS.mainCaption)mainCapOff=20;
    else if(hasMain2&&(IMGS.mainCaption||IMGS.main2Caption))mainCapOff=20;
    if(smallN>0&&currentSmallPos==='below-main'){
      drawSmallImgs(PAD,y0+mainBlockH+8+mainCapOff,leftW,3);
    }

    // RIGHT column
    var ry2=y0;
    ctx.fillStyle=ac;ctx.fillRect(RX,ry2,3,34);
    ctx.fillStyle=cText;ctx.font="700 22px 'Noto Serif TC',serif";
    ctx.fillText(v('c-name')||t('lbl-cname'),RX+10,ry2+24);
    ctx.fillStyle=hex2rgba(ac,.7);ctx.font="400 10px 'Noto Sans TC',sans-serif";
    ctx.fillText(t('cv-charref'),RX+10,ry2+36);
    ry2+=50;

    if(T.chara.length){
      ctx.fillStyle=ac;ctx.font="500 13px 'Noto Sans TC',sans-serif";ctx.fillText(t('cv-chartags'),RX,ry2+13);
      var tlen2=ctx.measureText(t('cv-chartags')).width+10;
      var tlg3=ctx.createLinearGradient(RX+tlen2,0,RX+RW,0);
      tlg3.addColorStop(0,hex2rgba(ac,.35));tlg3.addColorStop(1,'transparent');
      ctx.strokeStyle=tlg3;ctx.lineWidth=.6;
      ctx.beginPath();ctx.moveTo(RX+tlen2,ry2+8);ctx.lineTo(RX+RW,ry2+8);ctx.stroke();
      ry2+=36;
      ry2=tagRow(ctx,T.chara,RX,ry2,RX+RW,24,hex2rgba(ac2,.12),hex2rgba(ac2,.25),'#6d4fc7');
      ry2+=14;
      // small below tags
      if(smallN>0&&currentSmallPos==='below-tags'){
        drawSmallImgs(RX,ry2,RW,3);
        var hasSmCap=IMGS.smallCaptions.slice(0,smallN).some(function(c){return c&&c.trim()});
        var sCols=3,sWt=Math.floor((RW-(sCols-1)*5)/sCols);
        ry2+=Math.ceil(smallN/sCols)*(sWt+(hasSmCap?18:0)+5)+10;
      }
    }
    if(stats.length){
      var COLS=3,sCW=Math.floor((RW-(COLS-1)*6)/COLS);
      stats.forEach(function(s,i){
        var col=i%COLS,row=Math.floor(i/COLS);
        var scx2=RX+col*(sCW+6),scy2=ry2+row*52;
        rr(ctx,scx2,scy2,sCW,46,5);
        ctx.fillStyle=hex2rgba(ac2,.07);ctx.fill();
        ctx.strokeStyle=hex2rgba(ac,.15);ctx.lineWidth=.5;ctx.stroke();
        ctx.fillStyle=cLabel;ctx.font="400 14px 'Noto Sans TC',sans-serif";
        ctx.fillText(s.k,scx2+10,scy2+17);
        ctx.fillStyle=cText;ctx.font="500 18px 'Noto Sans TC',sans-serif";
        ctx.fillText(s.v,scx2+10,scy2+39);
      });
      ry2+=Math.ceil(stats.length/COLS)*52+10;
    }
    function drawSec(title,content,maxLines){
      if(!content)return;
      ctx.fillStyle=ac;ctx.font="500 13px 'Noto Sans TC',sans-serif";
      ctx.fillText(title,RX,ry2+13);
      var tlen=ctx.measureText(title).width+10;
      var tlg2=ctx.createLinearGradient(RX+tlen,0,RX+RW,0);
      tlg2.addColorStop(0,hex2rgba(ac,.35));tlg2.addColorStop(1,'transparent');
      ctx.strokeStyle=tlg2;ctx.lineWidth=0.6;
      ctx.beginPath();ctx.moveTo(RX+tlen,ry2+8);ctx.lineTo(RX+RW,ry2+8);ctx.stroke();
      ry2+=36;
      ctx.fillStyle=cText;ctx.font="400 13px 'Noto Sans TC',sans-serif";
      ry2=wrapT(ctx,content,RX,ry2,RW,20,maxLines||6);
      ry2+=14;
    }
    drawSec(t('cv-persona'),v('c-pers'),6);
    drawSec(t('cv-bgsetting'),v('c-bg'),6);

    // COMMISSION SECTION
    var smallCapEst=smallN>0&&IMGS.smallCaptions.slice(0,smallN).some(function(c){return c&&c.trim()})?Math.ceil(smallN/3)*18:0;
    var leftColH=mainBlockH+mainCapEst+(smallN>0&&currentSmallPos==='below-main'?8+Math.ceil(smallN/3)*(Math.floor((leftW-10)/3)+5)+smallCapEst:0);
    var commY=Math.max(y0+leftColH,ry2)+20;

  } else {
    // ── SIDE LAYOUT (左右排列) ──
    // 全幅寬，設定圖1左，設定圖2右，各佔一半
    var halfFW=Math.floor((W-PAD*2-10)/2);
    var h1side=IMGS.main  ? Math.round(halfFW/IMGS.main.width *IMGS.main.height ) : Math.round(halfFW*1.2);
    var h2side=IMGS.main2 ? Math.round(halfFW/IMGS.main2.width*IMGS.main2.height) : Math.round(halfFW*1.2);
    var sideImgH=Math.max(h1side,h2side);
    drawContain(IMGS.main, PAD,           y0,halfFW,sideImgH,7,t('cv-front'));
    drawContain(IMGS.main2,PAD+halfFW+10, y0,halfFW,sideImgH,7,t('cv-back'));
    var sideCapH=0;
    if(IMGS.main&&IMGS.mainCaption){ctx.fillStyle=cLabel;ctx.font="400 11px 'Noto Sans TC',sans-serif";ctx.fillText(IMGS.mainCaption.slice(0,50),PAD+4,y0+sideImgH+13);sideCapH=20;}
    if(IMGS.main2&&IMGS.main2Caption){ctx.fillStyle=cLabel;ctx.font="400 11px 'Noto Sans TC',sans-serif";ctx.fillText(IMGS.main2Caption.slice(0,50),PAD+halfFW+10+4,y0+sideImgH+13);sideCapH=20;}

    // small images below the two main images (full width, 6 cols)
    var sideSmallY=y0+sideImgH+sideCapH+10;
    if(smallN>0&&currentSmallPos==='below-main'){
      drawSmallImgs(PAD,sideSmallY,W-PAD*2,6);
      var hasSmCapSide=IMGS.smallCaptions.slice(0,smallN).some(function(c){return c&&c.trim()});
      var sWside=Math.floor((W-PAD*2-5*5)/6);
      sideSmallY+=Math.ceil(smallN/6)*(sWside+(hasSmCapSide?18:0)+5)+10;
    }

    // text content (名字、標籤、資料、個性、背景) — full width below
    var textY=sideSmallY;
    var textW=W-PAD*2;

    // name block
    ctx.fillStyle=ac;ctx.fillRect(PAD,textY,3,34);
    ctx.fillStyle=cText;ctx.font="700 22px 'Noto Serif TC',serif";
    ctx.fillText(v('c-name')||t('lbl-cname'),PAD+10,textY+24);
    ctx.fillStyle=hex2rgba(ac,.7);ctx.font="400 10px 'Noto Sans TC',sans-serif";
    ctx.fillText(t('cv-charref'),PAD+10,textY+36);
    textY+=50;

    // tags
    if(T.chara.length){
      ctx.fillStyle=ac;ctx.font="500 13px 'Noto Sans TC',sans-serif";ctx.fillText(t('cv-chartags'),PAD,textY+13);
      var tlen2s=ctx.measureText(t('cv-chartags')).width+10;
      var tlg3s=ctx.createLinearGradient(PAD+tlen2s,0,W-PAD,0);
      tlg3s.addColorStop(0,hex2rgba(ac,.35));tlg3s.addColorStop(1,'transparent');
      ctx.strokeStyle=tlg3s;ctx.lineWidth=.6;
      ctx.beginPath();ctx.moveTo(PAD+tlen2s,textY+8);ctx.lineTo(W-PAD,textY+8);ctx.stroke();
      textY+=36;
      textY=tagRow(ctx,T.chara,PAD,textY,W-PAD,24,hex2rgba(ac2,.12),hex2rgba(ac2,.25),'#6d4fc7');
      textY+=6;
    }
    // small below-tags: draw after name (or after tags if present)
    if(smallN>0&&currentSmallPos==='below-tags'){
      drawSmallImgs(PAD,textY,textW,6);
      var hasSmCapSide2=IMGS.smallCaptions.slice(0,smallN).some(function(c){return c&&c.trim()});
      var sWside2=Math.floor((textW-5*5)/6);
      textY+=Math.ceil(smallN/6)*(sWside2+(hasSmCapSide2?18:0)+5)+10;
    } else if(T.chara.length){
      textY+=8; // small padding after tags when no small imgs
    }

    // stats grid — 3 cols across half width each side
    if(stats.length){
      var COLS2=3,sCW2=Math.floor((textW-(COLS2-1)*6)/COLS2);
      stats.forEach(function(s,i){
        var col=i%COLS2,row=Math.floor(i/COLS2);
        var scx2=PAD+col*(sCW2+6),scy2=textY+row*52;
        rr(ctx,scx2,scy2,sCW2,46,5);
        ctx.fillStyle=hex2rgba(ac2,.07);ctx.fill();
        ctx.strokeStyle=hex2rgba(ac,.15);ctx.lineWidth=.5;ctx.stroke();
        ctx.fillStyle=cLabel;ctx.font="400 14px 'Noto Sans TC',sans-serif";
        ctx.fillText(s.k,scx2+10,scy2+17);
        ctx.fillStyle=cText;ctx.font="500 18px 'Noto Sans TC',sans-serif";
        ctx.fillText(s.v,scx2+10,scy2+39);
      });
      textY+=Math.ceil(stats.length/COLS2)*52+10;
    }

    // persona & bg — two columns
    var halfTW=Math.floor((textW-20)/2);
    function drawSecSide(title,content,sx,sw,maxLines){
      if(!content)return 0;
      var sy=textY;
      ctx.fillStyle=ac;ctx.font="500 13px 'Noto Sans TC',sans-serif";
      ctx.fillText(title,sx,sy+13);
      var tl=ctx.measureText(title).width+10;
      var tlg=ctx.createLinearGradient(sx+tl,0,sx+sw,0);
      tlg.addColorStop(0,hex2rgba(ac,.35));tlg.addColorStop(1,'transparent');
      ctx.strokeStyle=tlg;ctx.lineWidth=.6;
      ctx.beginPath();ctx.moveTo(sx+tl,sy+8);ctx.lineTo(sx+sw,sy+8);ctx.stroke();
      sy+=36;
      ctx.fillStyle=cText;ctx.font="400 13px 'Noto Sans TC',sans-serif";
      sy=wrapT(ctx,content,sx,sy,sw,20,maxLines||6);
      sy+=14;
      return sy-textY;
    }
    var persH=drawSecSide(t('cv-persona'),v('c-pers'),PAD,halfTW,6);
    var bgH=drawSecSide(t('cv-bgsetting'),v('c-bg'),PAD+halfTW+20,halfTW,6);
    textY+=Math.max(persH,bgH);

    // COMMISSION SECTION
    var commY=textY+20;
    // dummy drawSec to prevent reference errors
    function drawSec(){}
    var ry2=textY;
  } // end side layout

  var dlg2=ctx.createLinearGradient(0,0,W,0);
  dlg2.addColorStop(0,'transparent');dlg2.addColorStop(.1,hex2rgba(ac,.3));
  dlg2.addColorStop(.9,hex2rgba(ac,.3));dlg2.addColorStop(1,'transparent');
  ctx.strokeStyle=dlg2;ctx.lineWidth=.8;
  ctx.beginPath();ctx.moveTo(PAD,commY);ctx.lineTo(W-PAD,commY);ctx.stroke();
  commY+=16;

  ctx.fillStyle=cText;ctx.font="700 13px 'Noto Serif TC',serif";
  ctx.fillText(t('cv-commreq'),PAD,commY+12);
  commY+=28;

  // License badge — full-width row, left-aligned
  var isComm = currentLicense === 'com';
  var badgeText=isComm?t('cv-com'):t('cv-noncom');
  ctx.font="500 11px 'Noto Sans TC',sans-serif";
  var bdW=ctx.measureText(badgeText).width+20,bdX=PAD,bdY=commY,bdH=22;
  rr(ctx,bdX,bdY,bdW,bdH,11);
  ctx.fillStyle=isComm?'rgba(251,191,36,.15)':'rgba(52,211,153,.15)';ctx.fill();
  ctx.strokeStyle=isComm?'rgba(251,191,36,.5)':'rgba(52,211,153,.5)';ctx.lineWidth=.8;ctx.stroke();
  ctx.fillStyle=isComm?'#d97706':'#059669';
  ctx.textAlign='center';ctx.fillText(badgeText,bdX+bdW/2,bdY+bdH/2+4);ctx.textAlign='left';
  commY+=32;

  var colGap=20;
  var leftCW=Math.round((W-PAD*2-colGap)*0.4);
  var rightCW=W-PAD*2-colGap-leftCW;
  var LX=PAD, RX2=PAD+leftCW+colGap;
  var colStartY=commY;

  var ly=colStartY;
  var platVal=v('cm-plat');
  if(platVal){
    ctx.fillStyle=hex2rgba(ac,.85);ctx.font="500 13px 'Noto Sans TC',sans-serif";
    ctx.fillText(t('cv-usage'),LX,ly+13);
    ly+=36;
    ctx.fillStyle=cText;ctx.font="400 13px 'Noto Sans TC',sans-serif";
    ly=wrapT(ctx,platVal,LX,ly,leftCW,20,3);
    ly+=12;
  }
  if(T.ok.length){
    ctx.fillStyle='#059669';ctx.font="500 13px 'Noto Sans TC',sans-serif";ctx.fillText(t('cv-ok'),LX,ly+13);
    ly+=36;
    ly=tagRow(ctx,T.ok,LX,ly,LX+leftCW,22,'rgba(52,211,153,.12)','rgba(52,211,153,.35)','#059669');
    ly+=10;
  }
  if(T.ng.length){
    ctx.fillStyle='#dc2626';ctx.font="500 13px 'Noto Sans TC',sans-serif";ctx.fillText(t('cv-ng'),LX,ly+13);
    ly+=36;
    ly=tagRow(ctx,T.ng,LX,ly,LX+leftCW,22,'rgba(239,68,68,.1)','rgba(239,68,68,.3)','#dc2626');
    ly+=10;
  }

  var rry=colStartY;
  var note2=v('cm-note');
  if(note2){
    ctx.fillStyle=ac;ctx.font="500 13px 'Noto Sans TC',sans-serif";ctx.fillText(t('cv-notes'),RX2,rry+13);
    var nlen=ctx.measureText(t('cv-notes')).width+10;
    var nlg=ctx.createLinearGradient(RX2+nlen,0,RX2+rightCW,0);
    nlg.addColorStop(0,hex2rgba(ac,.35));nlg.addColorStop(1,'transparent');
    ctx.strokeStyle=nlg;ctx.lineWidth=.6;
    ctx.beginPath();ctx.moveTo(RX2+nlen,rry+8);ctx.lineTo(RX2+rightCW,rry+8);ctx.stroke();
    rry+=36;
    ctx.fillStyle=cText;ctx.font="400 13px 'Noto Sans TC',sans-serif";
    rry=wrapT(ctx,note2,RX2,rry,rightCW,20,12);
    rry+=10;
  }

  commY=Math.max(ly,rry)+6;

  var rImgs=IMGS.ref.filter(Boolean);
  if(rImgs.length){
    commY+=8;
    ctx.fillStyle=ac;ctx.font="500 13px 'Noto Sans TC',sans-serif";ctx.fillText(t('cv-refimgs'),PAD,commY+13);
    var rlen=ctx.measureText(t('cv-refimgs')).width+10;
    var rlg=ctx.createLinearGradient(PAD+rlen,0,W-PAD,0);
    rlg.addColorStop(0,hex2rgba(ac,.35));rlg.addColorStop(1,'transparent');
    ctx.strokeStyle=rlg;ctx.lineWidth=.6;
    ctx.beginPath();ctx.moveTo(PAD+rlen,commY+8);ctx.lineTo(W-PAD,commY+8);ctx.stroke();
    commY+=36;

    var maxRefW=W-PAD*2;

    if(currentRefLayout==='grid'){
      var gCols=2, gGap=10;
      var gCellW=Math.floor((maxRefW-(gCols-1)*gGap)/gCols);
      var totalH=0;
      var grows=Math.ceil(rImgs.length/gCols);
      var gridDims=rImgs.map(function(im){
        var scale=Math.min(gCellW/im.width,1);
        return{dw:Math.round(im.width*scale),dh:Math.round(im.height*scale)};
      });
      for(var gr=0;gr<grows;gr++){
        var rowMaxH=0;
        for(var gc=0;gc<gCols;gc++){
          var gi=gr*gCols+gc;
          if(gi<rImgs.length&&gridDims[gi].dh>rowMaxH)rowMaxH=gridDims[gi].dh;
        }
        var capH=0;
        for(var gc=0;gc<gCols;gc++){
          var gi=gr*gCols+gc;
          if(gi<rImgs.length&&IMGS.refCaptions[gi]&&IMGS.refCaptions[gi].trim())capH=20;
        }
        for(var gc=0;gc<gCols;gc++){
          var gi=gr*gCols+gc;
          if(gi>=rImgs.length)break;
          var gim=rImgs[gi],gd=gridDims[gi];
          var gcx=PAD+gc*(gCellW+gGap);
          var gcy=commY+totalH;
          rr(ctx,gcx,gcy,gCellW,rowMaxH,5);
          ctx.fillStyle=cCard;ctx.fill();
          ctx.strokeStyle=hex2rgba(ac,.2);ctx.lineWidth=.8;ctx.stroke();
          var gox=gcx+Math.round((gCellW-gd.dw)/2);
          var goy=gcy+Math.round((rowMaxH-gd.dh)/2);
          ctx.save();rr(ctx,gcx,gcy,gCellW,rowMaxH,5);ctx.clip();
          ctx.drawImage(gim,gox,goy,gd.dw,gd.dh);
          ctx.restore();
          var gcap=IMGS.refCaptions[gi]||'';
          if(gcap){
            ctx.fillStyle=cLabel;ctx.font="400 11px 'Noto Sans TC',sans-serif";
            ctx.fillText(gcap.slice(0,50),gcx+4,gcy+rowMaxH+14);
          }
        }
        totalH+=rowMaxH+capH+(gr<grows-1?gGap+6:0);
      }
      commY+=totalH+8;
    } else {
      // orig: each image at full natural size, laid out vertically one by one
      var hasAnyCap=IMGS.refCaptions.slice(0,rImgs.length).some(function(c){return c&&c.trim()});
      rImgs.forEach(function(im,i){
        var dw=im.width, dh=im.height;
        // if wider than canvas, scale down to fit width only
        if(dw>W-PAD*2){
          var sc=( W-PAD*2)/dw;
          dw=Math.round(dw*sc);dh=Math.round(dh*sc);
        }
        rr(ctx,PAD,commY,dw,dh,5);
        ctx.fillStyle=cCard;ctx.fill();
        ctx.strokeStyle=hex2rgba(ac,.2);ctx.lineWidth=.8;ctx.stroke();
        ctx.save();rr(ctx,PAD,commY,dw,dh,5);ctx.clip();
        ctx.drawImage(im,PAD,commY,dw,dh);
        ctx.restore();
        var cap=IMGS.refCaptions[i]||'';
        if(cap){
          ctx.fillStyle=cLabel;ctx.font="400 11px 'Noto Sans TC',sans-serif";
          ctx.fillText(cap.slice(0,50),PAD+4,commY+dh+14);
        }
        commY+=dh+(cap?22:0)+10;
      });
    }
  }

  // FOOTER
  var footY=H-FOOTER;
  var fg2=ctx.createLinearGradient(0,footY,W,footY);
  fg2.addColorStop(0,'#1a1a2e');fg2.addColorStop(1,'#16213e');
  ctx.fillStyle=fg2;ctx.fillRect(0,footY,W,FOOTER);
  var cn=v('ct-name'),cth=v('ct-tw');
  if(cn||cth){
    ctx.fillStyle='rgba(255,255,255,.45)';ctx.font="400 11px 'Noto Sans TC',sans-serif";
    ctx.fillText(cn,PAD,footY+20);
    ctx.fillStyle='rgba(255,255,255,.8)';ctx.font="500 11px 'Noto Sans TC',sans-serif";
    ctx.fillText(cth,PAD+(cn?ctx.measureText(cn).width+4:0),footY+20);
  }
  ctx.fillStyle='rgba(255,255,255,.2)';ctx.font="400 10px 'Noto Sans TC',sans-serif";
  ctx.textAlign='right';ctx.fillText(t('cv-footer'),W-PAD,footY+20);ctx.textAlign='left';
}

function setZoom(val){
  g('zlbl').textContent=val+'%';
  g('tw2').style.transform='scale('+val/100+')';
  g('tw2').style.transformOrigin='top center';
}
function exportPNG(){
  setMsg(t('msg-saving'));
  setTimeout(function(){
    try{
      var a=document.createElement('a');
      a.download=(v('c-name')||'commission')+'_ref.png';
      a.href=canvas.toDataURL('image/png');a.click();
      setMsg('');
    }catch(e){setMsg('失敗: '+e.message)}
  },50);
}
function getState(){
  return{
    fields:{name:v('c-name'),gender:v('c-gender'),bday:v('c-bday'),age:v('c-age'),h:v('c-h'),w:v('c-w'),body:v('c-body'),hair:v('c-hair'),eye:v('c-eye'),skin:v('c-skin'),pers:v('c-pers'),bg:v('c-bg'),cmType:v('cm-type'),cmPlat:v('cm-plat'),cmNote:v('cm-note'),ctName:v('ct-name'),ctTw:v('ct-tw')},
    tags:JSON.parse(JSON.stringify(T)),
    license:currentLicense,
    refLayout:currentRefLayout,
    bodyLayout:currentBodyLayout,
    smallPos:currentSmallPos,
    refCaptions:IMGS.refCaptions.slice(),
    smallCaptions:IMGS.smallCaptions.slice(),
    mainCaption:IMGS.mainCaption,
    main2Caption:IMGS.main2Caption,
    ac:v('col-a'),ac2:v('col-b'),sz:v('sz'),colPct:v('col-pct'),mainLayout:v('main-layout'),
    lang:currentLang
  };
}
function applyState(s){
  var f=s.fields||{};
  var m={'c-name':'name','c-gender':'gender','c-bday':'bday','c-age':'age','c-h':'h','c-w':'w','c-body':'body','c-hair':'hair','c-eye':'eye','c-skin':'skin','c-pers':'pers','c-bg':'bg','cm-type':'cmType','cm-plat':'cmPlat','cm-note':'cmNote','ct-name':'ctName','ct-tw':'ctTw'};
  Object.keys(m).forEach(function(id){if(g(id)&&f[m[id]]!=null)g(id).value=f[m[id]]});
  T=s.tags||{chara:[],ok:[],ng:[]};
  ['chara','ok','ng'].forEach(renderTagUI);
  if(s.license)setLicense(s.license);
  if(s.refLayout)setRefLayout(s.refLayout);
  if(s.bodyLayout)setBodyLayout(s.bodyLayout);
  if(s.smallPos)setSmallPos(s.smallPos);
  if(s.refCaptions)IMGS.refCaptions=s.refCaptions.slice();
  if(s.smallCaptions)IMGS.smallCaptions=s.smallCaptions.slice();
  if(s.mainCaption!=null)IMGS.mainCaption=s.mainCaption;
  if(s.main2Caption!=null)IMGS.main2Caption=s.main2Caption;
  if(s.ac)g('col-a').value=s.ac;
  if(s.ac2)g('col-b').value=s.ac2;
  if(s.sz)g('sz').value=s.sz;
  if(s.colPct){g('col-pct').value=s.colPct;g('col-pct-lbl').textContent=s.colPct+'%';}
  if(s.mainLayout)g('main-layout').value=s.mainLayout;
  if(s.lang)setLang(s.lang);
  draw();
}
function exportJSON(){
  var blob=new Blob([JSON.stringify(getState(),null,2)],{type:'application/json'});
  var a=document.createElement('a');a.download=(v('c-name')||'commission')+'_data.json';a.href=URL.createObjectURL(blob);a.click();
}
function importJSON(input){
  var f=input.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(e){try{applyState(JSON.parse(e.target.result))}catch(ex){setMsg(t('msg-badJSON'))}input.value=''};
  r.readAsText(f);
}
function saveTpl(){
  var nm=v('tpl-n').trim();if(!nm){setMsg(t('msg-notplname'));return}
  var tpls=JSON.parse(localStorage.getItem('ctpls')||'{}');
  tpls[nm]=getState();localStorage.setItem('ctpls',JSON.stringify(tpls));
  g('tpl-n').value='';setMsg(t('msg-tplsaved')+nm);renderTpls();
}
function renderTpls(){
  var tpls=JSON.parse(localStorage.getItem('ctpls')||'{}'),keys=Object.keys(tpls);
  var el=g('tpl-list');
  if(!keys.length){el.innerHTML='<div style="font-size:10px;color:var(--muted)">'+t('tpl-empty')+'</div>';return}
  el.innerHTML=keys.map(function(k){
    return '<div style="display:flex;gap:5px"><button class="btn" style="flex:1;text-align:left;font-size:11px" onclick="loadTpl(\''+k.replace(/'/g,"\\'")+'\')">'+ esc(k) +'</button><button class="btn" style="padding:5px 8px;font-size:10px;color:#f87171" onclick="delTpl(\''+k.replace(/'/g,"\\'")+'\')">✕</button></div>';
  }).join('');
}
function loadTpl(k){var tpls=JSON.parse(localStorage.getItem('ctpls')||'{}');if(tpls[k])applyState(tpls[k])}
function delTpl(k){var tpls=JSON.parse(localStorage.getItem('ctpls')||'{}');delete tpls[k];localStorage.setItem('ctpls',JSON.stringify(tpls));renderTpls()}

// Init
applyLang();
setZoom(65);
renderTpls();
</script>
